app:
  # Should be the same as backend.baseUrl when using the `app-backend` plugin.
  baseUrl: http://localhost:7007
  # baseUrl: http://192.168.49.2:30007
  listen: 
    host: 0.0.0.0

backend:
  # Note that the baseUrl should be the URL that the browser and other clients
  # should use when communicating with the backend, i.e. it needs to be
  # reachable not just from within the backend host, but from all of your
  # callers. When its value is "http://localhost:7007", it's strictly private
  # and can't be reached by others.
  baseUrl: http://localhost:7007
  # baseUrl: http://192.168.49.2:30007
  # The listener can also be expressed as a single <host>:<port> string. In this case we bind to
  # all interfaces, the most permissive setting. The right value depends on your specific deployment.
  listen: 
    host: 0.0.0.0
    port: 7007

  # config options: https://node-postgres.com/apis/client
  database:
    client: better-sqlite3
    connection: ':memory:'
  # database:
  #   client: pg
  #   connection:
  #     host: ${POSTGRES_HOST}
  #     port: ${POSTGRES_PORT}
  #     user: ${POSTGRES_USER}
  #     password: ${POSTGRES_PASSWORD}
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt
auth:
  environment: development
  providers:
    guest: {}
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        ## uncomment if using GitHub Enterprise
        # enterpriseInstanceUrl: ${AUTH_GITHUB_ENTERPRISE_INSTANCE_URL}
        signIn:
          resolvers:
            # Matches the GitHub username with the Backstage user entity name.
            # See https://backstage.io/docs/auth/github/provider#resolvers for more resolvers.
            - resolver: usernameMatchingUserEntityName
catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template]
  locations:
    # Local example data, file locations are relative to the backend process, typically `packages/backend`
    - type: file
      # target: /app/examples/entities.yaml
      target: /app/catalog/entities/users.yaml
      rules:
        - allow: [User]

    - type: file
      # target: /app/examples/org.yaml
      target: /app/catalog/entities/groups.yaml
      rules:
        - allow: [Group]

    - type: url
      target: https://github.com/saagarsvs05/backstage-software-template/blob/main/python-app/template.yaml
      rules:
        - allow: [Template]
    
    - type: url
      target: https://github.com/saagarsvs05/backstage-software-template/blob/main/nodejs-app/template.yaml
      rules:
        - allow: [Template]

    - type: url
      target: https://github.com/saagarsvs05/backstage-software-template/blob/main/react-app/template.yaml
      rules:
        - allow: [Template]

    - type: url
      target: https://github.com/saagarsvs05/backstage-software-template/blob/main/dotnet-app/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/saagarsvs05/backstage-software-template/blob/main/angular-app/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/saagarsvs05/backstage-software-template/blob/main/IAC/template.yaml
      rules:
        - allow: [Template]
integrations:
  github:
    - host: github.com
      # This is a Personal Access Token or PAT from GitHub. You can find out how to generate this token, and more information
      # about setting up the GitHub integration here: https://backstage.io/docs/integrations/github/locations#configuration
      token: ${GITHUB_TOKEN}
